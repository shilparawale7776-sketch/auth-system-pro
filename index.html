<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth System Pro</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container" id="container">

  <!-- LOGIN -->
  <div class="form-container login-container">

    <h2 id="title">Login</h2>
    <p class="subtitle" id="desc">Welcome Back 👋</p>

    <input type="email" id="loginEmail" placeholder="Enter Email">

    <div class="pass-box">
      <input type="password" id="loginPass" placeholder="Enter Password">
      <i class="fa-solid fa-eye"
         onclick="togglePass('loginPass',this)"></i>
    </div>

    <button onclick="login()">Login</button>
  </div>

  <!-- REGISTER -->
  <div class="form-container register-container">

    <h2>Create Account</h2>
    <p class="subtitle">Create your account 🚀</p>

    <input type="text" id="regName" placeholder="Full Name">
    <small id="nameErr"></small>

    <input type="email" id="regEmail" placeholder="Email Address">

    <div class="pass-box">
      <input type="password" id="regPass" placeholder="Create Password">
      <i class="fa-solid fa-eye"
         onclick="togglePass('regPass',this)"></i>
    </div>

    <div id="strength"></div>

    <div class="pass-box">
      <input type="password" id="confirmPass" placeholder="Confirm Password">
      <i class="fa-solid fa-eye"
         onclick="togglePass('confirmPass',this)"></i>
    </div>

    <small id="passErr"></small>

    <button onclick="register()">Create Account</button>
  </div>

  <!-- OVERLAY -->
  <div class="overlay-container" onclick="toggle()">
    <h2>Welcome</h2>
    <p>Click to switch login/signup</p>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="script.js" defer></script>

</body>
</html>
